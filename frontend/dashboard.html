<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TIC Club Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Style */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
        }

        .nav-links li {
            margin-bottom: 0.5rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-weight: 500;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links a.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* Top Header */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 24px;
        }

        header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            text-align: right;
        }

        .user-info .name {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info .role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Module Content Area */
        #module-container {
            animation: fadeIn 0.5s ease-out;
        }

        .stat-card {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .grid-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-brand">
                <i class="fas fa-microchip"></i>
                <h2 class="brand">TIC Club</h2>
            </div>

            <ul class="nav-links">
                <li><a href="#" class="active" data-module="overview"><i class="fas fa-th-large"></i> Overview</a></li>
                <li><a href="#" data-module="students"><i class="fas fa-user-graduate"></i> Students</a></li>
                <li><a href="#" data-module="teams"><i class="fas fa-users"></i> Teams</a></li>
                <li><a href="#" data-module="events"><i class="fas fa-calendar-alt"></i> Events</a></li>
                <li><a href="#" data-module="attendance"><i class="fas fa-clipboard-check"></i> Attendance</a></li>
            </ul>

            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="btn" style="color: var(--accent);"><i
                        class="fas fa-sign-out-alt"></i> Sign Out</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="search-box glass">
                    <!-- Future search implementation -->
                </div>

                <div class="user-profile">
                    <div class="user-info">
                        <span class="name" id="user-display-name">Admin User</span>
                        <span class="role" id="user-display-role">Super Admin</span>
                    </div>
                    <div class="avatar" id="user-avatar">AD</div>
                </div>
            </header>

            <div id="module-container">
                <!-- Overview Content (Default) -->
                <div id="overview-module">
                    <h2 style="margin-bottom: 24px;">Welcome Back, Coordinator!</h2>
                    <div class="grid-dashboard">
                        <div class="stat-card glass-card">
                            <div class="stat-icon"><i class="fas fa-user-graduate"></i></div>
                            <div>
                                <span style="color: var(--text-muted); font-size: 0.9rem;">Total Students</span>
                                <h3 id="stat-students">120</h3>
                            </div>
                        </div>
                        <div class="stat-card glass-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div>
                                <span style="color: var(--text-muted); font-size: 0.9rem;">Active Teams</span>
                                <h3 id="stat-teams">12</h3>
                            </div>
                        </div>
                        <div class="stat-card glass-card">
                            <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                            <div>
                                <span style="color: var(--text-muted); font-size: 0.9rem;">Upcoming Events</span>
                                <h3 id="stat-events">4</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
