<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP — TIC Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body class="auth-page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-box" style="font-size:24px;color:var(--purple);box-shadow:var(--glow-purple);"><i class="fa-solid fa-shield-halved"></i></div>
                <h1>VERIFY OTP</h1>
                <p>ENTER THE 6-DIGIT CODE FROM YOUR EMAIL</p>
            </div>

            <div class="alert error" id="alertBox">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="alertMsg">Invalid OTP.</span>
            </div>

            <form class="auth-form" id="otpForm" novalidate>
                <div class="input-group" style="align-items:center;">
                    <label>ONE-TIME PASSWORD</label>
                    <div class="otp-wrap">
                        <input class="otp-input" type="text" maxlength="1" id="otp1" inputmode="numeric">
                        <input class="otp-input" type="text" maxlength="1" id="otp2" inputmode="numeric">
                        <input class="otp-input" type="text" maxlength="1" id="otp3" inputmode="numeric">
                        <input class="otp-input" type="text" maxlength="1" id="otp4" inputmode="numeric">
                        <input class="otp-input" type="text" maxlength="1" id="otp5" inputmode="numeric">
                        <input class="otp-input" type="text" maxlength="1" id="otp6" inputmode="numeric">
                    </div>
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <div class="pass-wrap input-icon-wrap">
                        <input class="input-field" type="password" id="newPassword" placeholder="Min. 8 characters" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm New Password</label>
                    <div class="input-icon-wrap">
                        <input class="input-field" type="password" id="confirmPassword" placeholder="Re-enter password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">
                    <i class="fa-solid fa-check"></i>
                    <span id="btnText">RESET PASSWORD</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>

            <div class="auth-footer">
                <a href="forgot-password.html" class="form-link">
                    <i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Resend OTP
                </a>
            </div>
        </div>
    </div>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/otp.js"></script>
</body>
</html>
