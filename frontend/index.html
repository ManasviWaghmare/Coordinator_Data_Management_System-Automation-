<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TIC Club Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .brand-logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        #login-form button {
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
        }

        .alert {
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
        }

        .alert-error {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container glass-card">
        <div class="brand-logo">
            <h1>TIC Club</h1>
            <p>Coordinator Data Management System</p>
        </div>

        <div id="alert" class="alert alert-error"></div>

        <form id="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" value="Admin" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="Adm1n*00" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">
                <span id="btn-text">Sign In</span>
                <div id="spinner" class="spinner"></div>
            </button>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
