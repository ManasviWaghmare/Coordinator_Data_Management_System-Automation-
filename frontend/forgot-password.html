<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — TIC Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body class="auth-page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-box" style="font-size:24px;"><i class="fa-solid fa-key"></i></div>
                <h1>PASSWORD RESET</h1>
                <p>ENTER YOUR EMAIL TO RECEIVE OTP</p>
            </div>

            <div class="alert error" id="alertBox">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="alertMsg">An error occurred.</span>
            </div>
            <div class="alert success" id="successBox">
                <i class="fa-solid fa-check-circle"></i>
                <span id="successMsg">OTP sent! Check your email.</span>
            </div>

            <form class="auth-form" id="forgotForm" novalidate>
                <div class="input-group">
                    <label>Registered Email</label>
                    <div class="input-icon-wrap">
                        <input class="input-field" type="email" id="email" placeholder="your@email.com" required>
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span id="btnText">SEND OTP</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>

            <div class="auth-footer">
                <a href="index.html" class="form-link">
                    <i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/forgot-password.js"></script>
</body>
</html>
