<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — TIC Club System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/dashboard.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-brand"><div class="brand-logo"><div class="brand-icon"><i class="fa-solid fa-database"></i></div><div><div class="brand-name">TIC CLUB</div><div class="brand-sub">DATA MANAGEMENT SYSTEM</div></div></div></div>
        <nav>
            <div class="nav-section">
                <div class="nav-label">Core</div>
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
                <a href="students.html"  class="nav-item"><i class="fa-solid fa-user-graduate"></i> Students</a>
                <a href="teams.html"     class="nav-item"><i class="fa-solid fa-users"></i> Teams</a>
                <a href="events.html"    class="nav-item active"><i class="fa-solid fa-calendar-days"></i> Events</a>
                <a href="attendance.html"class="nav-item"><i class="fa-solid fa-clipboard-check"></i> Attendance</a>
            </div>
            <div class="nav-section"><div class="nav-label">Analytics</div><a href="reports.html" class="nav-item"><i class="fa-solid fa-chart-bar"></i> Reports</a></div>
        </nav>
        <div class="sidebar-footer"><div class="user-mini"><div class="user-avatar">A</div><div class="user-info"><div class="name">Admin</div><div class="role">ROLE_ADMIN</div></div><button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i></button></div></div>
    </aside>

    <main class="main">
        <header class="topbar">
            <span class="page-title">EVENT MANAGEMENT</span>
            <div class="topbar-search"><i class="fa-solid fa-search"></i><input type="text" id="searchInput" placeholder="Search events..."></div>
            <div class="topbar-actions"><div class="topbar-icon"><i class="fa-regular fa-bell"></i></div></div>
        </header>

        <div class="page-content">
            <div class="section-header" style="margin-bottom:20px;">
                <span class="section-title">All Events</span>
                <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Schedule Event</button>
            </div>

            <div class="table-card">
                <div class="table-toolbar">
                    <span class="text-muted" style="font-size:13px;">Events: <span id="totalCount" class="text-cyan">0</span></span>
                    <div style="margin-left:auto;display:flex;gap:10px;">
                        <select class="input-field" id="statusFilter" style="padding:8px 12px;width:auto;font-size:12px;">
                            <option value="">All Status</option>
                            <option>Upcoming</option>
                            <option>Completed</option>
                            <option>Cancelled</option>
                        </select>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Event Title</th>
                            <th>Date</th>
                            <th>Location</th>
                            <th>Created By</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="eventsBody">
                        <tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px;">Loading events...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="eventModal">
    <div class="modal" style="max-width:520px;">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">SCHEDULE EVENT</span>
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="eventForm" novalidate>
            <div class="form-grid">
                <div class="input-group full">
                    <label>Event Title</label>
                    <input class="input-field" type="text" id="title" placeholder="e.g. AI Automation Workshop" required>
                </div>
                <div class="input-group full">
                    <label>Description</label>
                    <textarea class="input-field" id="description" placeholder="Event details..." rows="3" style="resize:vertical;"></textarea>
                </div>
                <div class="input-group">
                    <label>Event Date & Time</label>
                    <input class="input-field" type="datetime-local" id="eventDate" required>
                </div>
                <div class="input-group">
                    <label>Location</label>
                    <input class="input-field" type="text" id="location" placeholder="e.g. Lab 301 / Online">
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-calendar-plus"></i> Save Event
                </button>
            </div>
        </form>
    </div>
</div>

<script src="./assets/js/api.js"></script>
<script src="./assets/js/events.js"></script>
</body>
</html>
